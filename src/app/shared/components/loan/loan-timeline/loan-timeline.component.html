<div class="loan-timeline" [class.compact]="compact">
  <h6 class="mb-4" *ngIf="!compact">
    <i class="bi bi-clock-history me-2"></i>
    Loan Journey
  </h6>

  <div class="timeline">
    <div 
      class="timeline-item" 
      *ngFor="let event of timeline; let last = last"
      [class.completed]="event.status === 'completed'"
      [class.current]="event.status === 'current'"
      [class.pending]="event.status === 'pending'">
      
      <!-- Timeline Icon -->
      <div class="timeline-marker">
        <span class="badge rounded-circle p-2" [ngClass]="event.badgeClass">
          <i [class]="'bi ' + event.icon"></i>
        </span>
      </div>

      <!-- Timeline Content -->
      <div class="timeline-content">
        <div class="card shadow-sm">
          <div class="card-body" [class.p-2]="compact">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="mb-0" [class.small]="compact">{{ event.title }}</h6>
              <small class="text-muted">{{ formatDate(event.date) }}</small>
            </div>
            <p class="mb-0 text-muted" [class.small]="compact">
              {{ event.description }}
            </p>
          </div>
        </div>
      </div>

      <!-- Timeline Line -->
      <div class="timeline-line" *ngIf="!last"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="text-center py-4" *ngIf="timeline.length === 0">
    <i class="bi bi-clock-history text-muted" style="font-size: 3rem;"></i>
    <p class="text-muted mt-2">No timeline events available</p>
  </div>
</div>
