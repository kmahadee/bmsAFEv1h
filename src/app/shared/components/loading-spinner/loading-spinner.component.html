
<div *ngIf="overlay" class="loading-overlay">
  <div class="spinner-container">
    <div [class]="spinnerClass" role="status">
      <span class="visually-hidden">{{ message }}</span>
    </div>
    <p class="mt-3 text-white" *ngIf="message">{{ message }}</p>
  </div>
</div>

<div *ngIf="!overlay" class="text-center">
  <div [class]="spinnerClass" role="status">
    <span class="visually-hidden">{{ message }}</span>
  </div>
  <p class="mt-2" *ngIf="message">{{ message }}</p>
</div>
